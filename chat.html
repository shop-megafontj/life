
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рабочее место оператора | MegaFon TJ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <!-- Firebase Auth -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <!-- Firebase Realtime Database -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary-megafon: #00B956;
            --primary-megafon-dark: #009645;
        }
        /* Скрытие скроллбара, но сохранение прокрутки */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Плавное открытие аккордеона (поповера) */
        .template-body {
            transition: all 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .template-body.expanded {
            max-height: 1200px; /* С запасом для длинных текстов */
            opacity: 1;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        /* Анимация загрузки */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse-fast {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="h-screen w-full bg-gray-50 overflow-hidden font-sans text-gray-800 flex">

    <!-- Левая панель: База шаблонов -->
    <div class="w-1/3 min-w-[320px] max-w-[450px] bg-white border-r border-gray-200 flex flex-col shadow-xl z-10 h-full">
        
        <!-- Шапка панели -->
        <div class="p-5 bg-[#00B956] text-white shadow-md z-20">
            <div class="flex items-center gap-3 mb-5">
                <!-- Иконка МегаФон / Чата -->
                <div class="p-2 bg-white/20 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide leading-tight">Шаблоны</h1>
                    <p class="text-xs text-white/80" id="db-status">Подключение к базе...</p>
                </div>
            </div>
            
            <!-- Поля поиска -->
            <div class="flex flex-col gap-3">
                <!-- Поиск RU -->
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                    <input type="text" id="search-ru" placeholder="Поиск на русском..." class="w-full pl-10 pr-3 py-2.5 rounded-lg border-0 text-sm text-gray-800 bg-white/95 focus:bg-white focus:ring-2 focus:ring-white/50 focus:outline-none transition-all shadow-inner placeholder-gray-400 font-medium">
                </div>
                <!-- Поиск TJ -->
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                    <input type="text" id="search-tj" placeholder="Ҷустуҷӯ ба тоҷикӣ..." class="w-full pl-10 pr-3 py-2.5 rounded-lg border-0 text-sm text-gray-800 bg-white/95 focus:bg-white focus:ring-2 focus:ring-white/50 focus:outline-none transition-all shadow-inner placeholder-gray-400 font-medium">
                </div>
            </div>
        </div>

        <!-- Список шаблонов -->
        <div class="flex-1 overflow-y-auto p-4 bg-gray-50/50 flex flex-col no-scrollbar">
            <div id="templates-count" class="mb-3 text-xs text-gray-500 font-semibold uppercase tracking-wider pl-1">
                Загрузка данных...
            </div>
            
            <div id="templates-container" class="flex flex-col gap-3">
                <!-- Скелетон загрузки -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 animate-pulse-fast">
                    <div class="h-4 bg-gray-200 rounded w-3/4 mb-3"></div>
                    <div class="flex gap-2"><div class="h-5 bg-gray-100 rounded w-16"></div><div class="h-5 bg-gray-100 rounded w-20"></div></div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 animate-pulse-fast">
                    <div class="h-4 bg-gray-200 rounded w-1/2 mb-3"></div>
                    <div class="flex gap-2"><div class="h-5 bg-gray-100 rounded w-24"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Правая панель: Рабочая среда оператора (iframe) -->
    <div class="flex-1 bg-[#f4f7f6] flex flex-col relative h-full">
        <!-- Фон-заглушка на время загрузки iframe -->
        <div class="absolute inset-0 flex flex-col items-center justify-center z-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#00B956" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-4 opacity-20"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <p class="text-gray-400 font-medium">Платформа оператора загружается...</p>
        </div>
        
        <!-- Iframe для загрузки корпоративного сайта -->
        <iframe src="https://operator.megafon.tj" class="w-full h-full border-0 z-10 bg-transparent relative" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>

    <script>
        // Иконки
        const icons = {
            chevronDown: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"></path></svg>`,
            chevronUp: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"></path></svg>`,
            copy: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path></svg>`,
            check: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><polyline points="20 6 9 17 4 12"></polyline></svg>`
        };

        // Конфигурация Firebase из вашего файла
        const firebaseConfig = {
            apiKey: "AIzaSyDEDIJIx6gGqeLk20nJWSlTxd6tnhmSGy4",
            authDomain: "bisoz-682b8.firebaseapp.com",
            databaseURL: "https://bisoz-682b8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bisoz-682b8",
            storageBucket: "bisoz-682b8.firebasestorage.app",
            messagingSenderId: "90545419911",
            appId: "1:90545419911:web:217b288ff83fa1e204ea22",
            measurementId: "G-WYNYL1RCX2"
        };

        // Инициализация Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.database();

        // Состояние приложения
        let allTemplates = [];
        let expandedId = null;
        let searchRu = "";
        let searchTj = "";

        // DOM элементы
        const container = document.getElementById('templates-container');
        const countLabel = document.getElementById('templates-count');
        const dbStatus = document.getElementById('db-status');
        const searchRuInput = document.getElementById('search-ru');
        const searchTjInput = document.getElementById('search-tj');

        // Подключение к БД и авторизация
        const initApp = () => {
            // Анонимная авторизация (чтобы обойти правила безопасности, если они есть, и не заставлять оператора логиниться дважды)
            auth.signInAnonymously()
                .then(() => {
                    dbStatus.textContent = "Синхронизировано";
                    dbStatus.classList.add('text-green-200');
                    fetchTemplates();
                })
                .catch((error) => {
                    // Если анонимный вход запрещен правилами, пробуем просто слушать базу 
                    // (Возможно пользователь уже авторизован сессией)
                    console.warn("Анонимный вход не удался:", error.message);
                    fetchTemplates();
                });
        };

        // Получение шаблонов из Realtime Database
        const fetchTemplates = () => {
            db.ref('templates').on('value', (snapshot) => {
                const data = snapshot.val();
                allTemplates = [];
                
                if (data) {
                    for (const key in data) {
                        const template = data[key];
                        // Проверяем статус (показываем одобренные или если статуса нет)
                        if (!template.status || template.status === 'approved') {
                            allTemplates.push({
                                id: key,
                                title: template.title || "Без названия",
                                text_ru: template.text_ru || "",
                                text_tj: template.text_tj || "",
                                tags: template.tags || []
                            });
                        }
                    }
                }
                
                // Сортировка по алфавиту
                allTemplates.sort((a, b) => a.title.localeCompare(b.title));
                renderTemplates();
                
            }, (error) => {
                console.error("Ошибка Firebase:", error);
                dbStatus.textContent = "Ошибка подключения";
                dbStatus.classList.remove('text-green-200');
                dbStatus.classList.add('text-red-300');
                container.innerHTML = `<div class="text-center p-4 text-red-500 bg-red-50 rounded-lg border border-red-100">Не удалось загрузить шаблоны: ${error.message}</div>`;
            });
        };

        // Отрисовка шаблонов
        const renderTemplates = () => {
            // Фильтрация
            const filtered = allTemplates.filter(template => {
                const sRu = searchRu.toLowerCase();
                const sTj = searchTj.toLowerCase();
                
                const title = template.title.toLowerCase();
                const tRu = template.text_ru.toLowerCase();
                const tTj = template.text_tj.toLowerCase();
                const tags = template.tags.join(" ").toLowerCase();

                const matchRu = searchRu === '' || title.includes(sRu) || tRu.includes(sRu) || tags.includes(sRu);
                const matchTj = searchTj === '' || title.includes(sTj) || tTj.includes(sTj) || tags.includes(sTj);

                return matchRu && matchTj;
            });

            countLabel.textContent = `Найдено шаблонов: ${filtered.length}`;
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-400 flex flex-col items-center bg-white rounded-xl border border-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-3 opacity-40"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                        <p class="font-medium">Шаблоны не найдены</p>
                        <p class="text-xs mt-1">Попробуйте изменить запрос</p>
                    </div>`;
                return;
            }

            filtered.forEach(template => {
                const isExpanded = expandedId === template.id;
                
                // Рендер тегов
                let tagsHtml = '';
                if (template.tags && template.tags.length > 0) {
                    tagsHtml = template.tags.map(tag => 
                        `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold bg-[#00B956]/10 text-[#009645] uppercase tracking-wide">${tag}</span>`
                    ).join('');
                }

                const item = document.createElement('div');
                item.className = `bg-white rounded-xl shadow-sm border transition-all duration-200 mb-3 ${isExpanded ? 'border-[#00B956] shadow-md' : 'border-gray-200 hover:border-[#00B956]/50'}`;
                
                item.innerHTML = `
                    <!-- Заголовок (кнопка раскрытия) -->
                    <div class="template-header p-4 flex justify-between items-center cursor-pointer select-none group" data-id="${template.id}">
                        <div class="flex-1 min-w-0 pr-4">
                            <h3 class="text-sm font-bold text-gray-800 truncate group-hover:text-[#00B956] transition-colors">${template.title}</h3>
                            <div class="flex gap-1 mt-1.5 overflow-x-auto no-scrollbar pointer-events-none">
                                ${tagsHtml}
                            </div>
                        </div>
                        <div class="text-gray-400 group-hover:text-[#00B956] transition-colors bg-gray-50 rounded-full p-1.5">
                            ${isExpanded ? icons.chevronUp : icons.chevronDown}
                        </div>
                    </div>
                    
                    <!-- Тело (Поповер/Аккордеон) -->
                    <div class="template-body ${isExpanded ? 'expanded px-4 border-t border-gray-100' : 'px-4'}" style="${isExpanded ? '' : 'display: none;'}">
                        
                        <!-- Русский вариант -->
                        <div class="mb-4 bg-gray-50 rounded-lg border border-gray-100 overflow-hidden">
                            <div class="flex justify-between items-center bg-gray-100/50 px-3 py-2 border-b border-gray-100">
                                <span class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Русский</span>
                                <button class="copy-btn flex items-center gap-1.5 text-xs text-[#00B956] font-semibold px-2.5 py-1 rounded-md hover:bg-[#00B956] hover:text-white transition-all" data-lang="ru" data-id="${template.id}">
                                    <span class="icon-slot">${icons.copy}</span>
                                    <span class="text-slot">Копировать</span>
                                </button>
                            </div>
                            <div class="p-3 text-[13px] text-gray-700 whitespace-pre-wrap leading-relaxed">${template.text_ru || '<span class="text-gray-400 italic">Нет текста</span>'}</div>
                        </div>

                        <!-- Таджикский вариант -->
                        <div class="bg-gray-50 rounded-lg border border-gray-100 overflow-hidden">
                            <div class="flex justify-between items-center bg-gray-100/50 px-3 py-2 border-b border-gray-100">
                                <span class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Тоҷикӣ</span>
                                <button class="copy-btn flex items-center gap-1.5 text-xs text-[#00B956] font-semibold px-2.5 py-1 rounded-md hover:bg-[#00B956] hover:text-white transition-all" data-lang="tj" data-id="${template.id}">
                                    <span class="icon-slot">${icons.copy}</span>
                                    <span class="text-slot">Нусхабардорӣ</span>
                                </button>
                            </div>
                            <div class="p-3 text-[13px] text-gray-700 whitespace-pre-wrap leading-relaxed">${template.text_tj || '<span class="text-gray-400 italic">Матн нест</span>'}</div>
                        </div>

                    </div>
                `;
                container.appendChild(item);
            });
        };

        // Обработчик копирования текста (Используем execCommand для надежной работы внутри iframe/кроссдоменных ограничений)
        const handleCopy = (button) => {
            const templateId = button.dataset.id;
            const lang = button.dataset.lang;
            const template = allTemplates.find(t => t.id === templateId);
            if (!template) return;

            const text = lang === 'ru' ? template.text_ru : template.text_tj;
            
            // Создаем временный элемент для копирования
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.top = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                
                // Визуальная обратная связь
                const iconSlot = button.querySelector('.icon-slot');
                const textSlot = button.querySelector('.text-slot');
                
                const originalHtml = iconSlot.innerHTML;
                const originalText = textSlot.innerText;

                // Стилизуем кнопку как успешную
                button.classList.add('bg-[#00B956]', 'text-white');
                iconSlot.innerHTML = icons.check;
                textSlot.innerText = lang === 'ru' ? 'Скопировано!' : 'Нусхабардорӣ шуд!';
                
                setTimeout(() => {
                    button.classList.remove('bg-[#00B956]', 'text-white');
                    iconSlot.innerHTML = originalHtml;
                    textSlot.innerText = originalText;
                }, 1500);
            } catch (err) {
                console.error('Ошибка копирования', err);
                alert("Не удалось скопировать текст. Ваш браузер блокирует действие.");
            } finally {
                document.body.removeChild(textArea);
            }
        };

        // === Привязка событий ===
        
        // Делегирование событий клика в контейнере
        container.addEventListener('click', (e) => {
            // Обработка раскрытия аккордеона
            const header = e.target.closest('.template-header');
            if (header) {
                const id = header.dataset.id;
                expandedId = expandedId === id ? null : id;
                renderTemplates();
                return;
            }

            // Обработка кнопки копирования
            const copyBtn = e.target.closest('.copy-btn');
            if (copyBtn) {
                handleCopy(copyBtn);
            }
        });

        // Поиск
        searchRuInput.addEventListener('input', (e) => {
            searchRu = e.target.value;
            renderTemplates();
        });

        searchTjInput.addEventListener('input', (e) => {
            searchTj = e.target.value;
            renderTemplates();
        });

        // Старт
        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
